<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Comunicação</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/communicacao.css">

</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <h2>🌐 Turma-B</h2>

            <a href="./dashboard.html">
                Dashboard
            </a>

            <a href="./communicacao.html">
                Comunicação
            </a>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <h1>💬 Comunicação</h1>

            <div class="communication-grid">

                <!-- CHAT -->

                <div class="chat-box">

                    <h2>Chat</h2>

                    <div id="messages"></div>

                    <div class="chat-input">

                        <input type="text" id="messageInput" placeholder="Digite mensagem...">

                        <button onclick="sendMessage()">
                            Enviar
                        </button>

                    </div>

                </div>

                <!-- FILES -->

                <div class="files-box">

                    <h2>Arquivos</h2>

                    <input type="file" id="fileInput">

                    <button onclick="uploadFile()">
                        Enviar
                    </button>

                    <div id="uploadedFiles"></div>

                </div>

            </div>

        </main>

    </div>

    <script type="module" src="./js/communication.js"></script>

</body>

</html>
