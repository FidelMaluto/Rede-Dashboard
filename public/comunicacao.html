<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Comunicação</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/comunicacao.css">
    <script type="module" src="./js/comunicacao.js" defer></script>

</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>Turma-B</h2>

            <a href="./dashboard.html">Dashboard</a>
            <a href="./comunicacao.html">Comunicação</a>

        </aside>

        <!-- MAIN -->
        <main class="main">
            <h1>Comunicação</h1>

            <div class="chat-controls">

                <label for="targetDevice">Dispositivo destino</label>

                <select id="targetDevice">
                    <option value="all">Todos</option>
                </select>

            </div>

            <div class="communication-wrapper">

                <!-- CHAT -->
                <section class="chat-section">

                    <div class="chat-header">

                        <h2>Chat da Rede</h2>

                    </div>

                    <div id="messages"></div>
                    <div class="chat-input">

                        <input type="text" id="messageInput" placeholder="Digite uma mensagem...">
                        <button type="button" onclick="sendMessage()"> Enviar</button>

                    </div>
                </section>

                <!-- FILES -->
                <section class="files-section">
                    <div class="files-header">

                        <h2>Arquivos Compartilhados</h2>

                    </div>
                    <div class="files-content">

                        <input type="file" id="fileInput" placeholder="Escolher Arquivos">
                        <button type="button" onclick="uploadFile()">Enviar Arquivo</button>

                        <div id="uploadedFiles"></div>

                    </div>
                </section>
            </div>
        </main>
    </div>

</body>

</html>
