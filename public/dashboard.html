<!DOCTYPE html>
<html lang="pt">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="./css/global.css">

    <link rel="stylesheet" href="./css/dashboard.css">

</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <h2>🌐 Turma-B</h2>

            <a href="/dashboard.html">
                Dashboard
            </a>

            <a href="/communication.html">
                Comunicação
            </a>

        </aside>

        <!-- MAIN -->

        <main class="main">

            <h1>
                Dashboard da Rede
            </h1>

            <div class="cards">

                <div class="card">

                    <h2>IP Servidor</h2>

                    <p id="serverIP">...</p>

                </div>

                <div class="card">

                    <h2>Dispositivos</h2>

                    <p id="total">0</p>

                </div>

                <div class="card">

                    <h2>Hora</h2>

                    <p id="time">--:--</p>

                </div>

            </div>

            <!-- TABELA -->

            <div class="table-container">

                <table>

                    <thead>

                        <tr>

                            <th>Dispositivo</th>

                            <th>IP</th>

                            <th>MAC</th>

                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody id="devices"></tbody>

                </table>

            </div>

            <!-- GRÁFICO -->

            <div class="chart-container">

                <canvas id="trafficChart"></canvas>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script type="module" src="./js/dashboard.js"></script>

</body>

</html>
